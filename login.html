<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | CreatorAI</title>
    <!-- Google Fonts: Clash Display, Inter -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="main.css">
</head>
<body class="login-body">

    <!-- Background Decoration -->
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-container glass-panel">
            <div class="login-header">
                <div class="logo-text large">Creator<span class="text-accent">AI</span></div>
                <p>Log in to your account</p>
            </div>

            <div class="login-methods-grid">
                <!-- TikTok Official Login (Primary) -->
                <div class="login-method-item primary" onclick="checkServerAndRedirect()">
                    <div class="method-icon"><i class="fa-brands fa-tiktok"></i></div>
                    <div class="method-text">Continue with TikTok (Official)</div>
                </div>

                <!-- QR Code Login -->
                <div class="login-method-item" onclick="selectMethod('qr')">
                    <div class="method-icon"><i class="fa-solid fa-qrcode"></i></div>
                    <div class="method-text">Use QR code</div>
                </div>

                <!-- Phone / Email / Username -->
                <div class="login-method-item" onclick="selectMethod('form')">
                    <div class="method-icon"><i class="fa-solid fa-user"></i></div>
                    <div class="method-text">Use phone / email / username</div>
                </div>
            </div>

            <!-- Login Form (Swapped visibility) -->
            <div id="login-form-context" class="login-form-context" style="display: none;">
                <div class="input-group">
                    <span class="input-icon"><i class="fa-solid fa-at"></i></span>
                    <input type="text" placeholder="Email or Username" id="login-id">
                </div>
                <div class="input-group">
                    <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" placeholder="Password" id="login-password">
                </div>
                <button class="btn btn-primary login-btn" onclick="handleLogin()">
                    Log in
                </button>
                <a href="#" class="back-to-methods" onclick="showMethods()"><i class="fa-solid fa-chevron-left"></i> Back to all options</a>
            </div>

            <div class="login-footer">
                <p>Don't have an account? <span class="text-accent underline">Sign up</span></p>
                <div class="login-terms">
                    By continuing, you agree to CreatorAI's <span class="text-accent">Terms of Service</span> and confirm that you have read CreatorAI's <span class="text-accent">Privacy Policy</span>.
                </div>
            </div>
        </div>
    </div>

    <script>
        function selectMethod(method) {
            const grid = document.querySelector('.login-methods-grid');
            const form = document.getElementById('login-form-context');
            
            if (method === 'form') {
                grid.style.display = 'none';
                form.style.display = 'block';
                form.classList.add('fade-in');
            } else if (method === 'qr') {
                alert('QR Login initialized. Please scan with your TikTok app.');
            }
        }

        function showMethods() {
            const grid = document.querySelector('.login-methods-grid');
            const form = document.getElementById('login-form-context');
            
            grid.style.display = 'flex';
            grid.classList.add('fade-in');
            form.style.display = 'none';
        }

        async function checkServerAndRedirect() {
            const btn = document.querySelector('.login-method-item.primary');
            const originalText = btn.querySelector('.method-text').innerText;
            
            try {
                btn.querySelector('.method-text').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Checking server...';
                
                // Use a short timeout for the health check
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                
                const response = await fetch('/health', { signal: controller.signal });
                clearTimeout(timeoutId);

                if (response.ok) {
                    window.location.href = '/login';
                } else {
                    throw new Error('Server responded with an error');
                }
            } catch (err) {
                btn.querySelector('.method-text').innerText = originalText;
                alert('⚠️ Backend server (server.js) is not running!\n\nPlease run "npm start" or "node server.js" in your terminal first.');
                console.error('Server check failed:', err);
            }
        }

        function handleLogin() {
            const id = document.getElementById('login-id').value;
            if(!id) return alert('Please enter your credentials');
            
            const btn = document.querySelector('.login-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            btn.disabled = true;
            
            setTimeout(() => {
                window.location.href = 'tiktok-auth.html';
            }, 1000);
        }
    </script>
</body>
</html>
